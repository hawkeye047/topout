<style>
        .shimmer {
            background: linear-gradient(90deg, #131b2e 25%, #222a3d 50%, #131b2e 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
        @keyframes shimmer {
            from { background-position: 200% 0; }
            to { background-position: -200% 0; }
        }
        .loading-spinner {
            border: 2px solid transparent;
            border-top-color: #ffc174;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="sticky top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#0b1326] rounded-none">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-amber-500 cursor-pointer">menu</span>
<h1 class="font-manrope font-bold tracking-[0.2em] text-[#dae2fd] text-xl uppercase">TOPOUT<span class="text-amber-500">.</span></h1>
</div>
<div class="flex items-center">
<button class="font-manrope font-bold tracking-tighter uppercase text-amber-500 hover:bg-[#222a3d] transition-colors duration-100 px-4 py-2 scale-100 active:scale-95">OWNER</button>
</div>
</header>
<main class="min-h-[calc(100vh-144px)] p-6 md:p-12 max-w-7xl mx-auto space-y-12">

<div class="flex flex-col items-center justify-center space-y-4 py-8">
<div class="loading-spinner"></div>
<p class="font-label text-xs uppercase tracking-[0.3em] text-secondary">Parsing your schedule...</p>
</div>
<!-- Stats Bar Skeleton -->
<section class="grid grid-cols-2 md:grid-cols-4 gap-px bg-surface-container-highest overflow-hidden border border-outline-variant/10">
<div class="bg-surface-container-low p-6 space-y-3">
<div class="h-3 w-16 shimmer opacity-50"></div>
<div class="h-8 w-24 shimmer"></div>
</div>
<div class="bg-surface-container-low p-6 space-y-3">
<div class="h-3 w-20 shimmer opacity-50"></div>
<div class="h-8 w-16 shimmer"></div>
</div>
<div class="bg-surface-container-low p-6 space-y-3">
<div class="h-3 w-12 shimmer opacity-50"></div>
<div class="h-8 w-32 shimmer"></div>
</div>
<div class="bg-surface-container-low p-6 space-y-3">
<div class="h-3 w-24 shimmer opacity-50"></div>
<div class="h-8 w-20 shimmer"></div>
</div>
</section>
<!-- Phase Cards Skeleton Grid -->
<section class="grid grid-cols-1 md:grid-cols-3 gap-8">
<!-- Phase Card 01 -->
<div class="flex flex-col bg-surface-container-low overflow-hidden">
<div class="bg-surface-container-highest p-4 flex justify-between items-center">
<div class="h-4 w-24 shimmer opacity-30"></div>
<div class="h-4 w-4 shimmer opacity-30"></div>
</div>
<div class="p-6 space-y-6">
<div class="space-y-2">
<div class="h-6 w-full shimmer"></div>
<div class="h-6 w-3/4 shimmer"></div>
</div>
<!-- Gantt Style Loading Bar -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<div class="h-3 w-12 shimmer opacity-20"></div>
<div class="h-3 w-8 shimmer opacity-20"></div>
</div>
<div class="h-2 w-full bg-secondary-container">
<div class="h-full w-1/3 bg-primary-container/40 animate-pulse"></div>
</div>
</div>
<div class="pt-4 flex gap-2">
<div class="h-8 w-20 shimmer opacity-20"></div>
<div class="h-8 w-20 shimmer opacity-20"></div>
</div>
</div>
</div>

<div class="h-2 w-full bg-secondary-container">

</div>

<div class="h-4 w-24 shimmer opacity-30"></div>
<div class="h-4 w-4 shimmer opacity-30"></div>
</div>
<div class="p-6 space-y-6">
<div class="space-y-2">
<div class="h-6 w-full shimmer"></div>
<div class="h-6 w-2/3 shimmer"></div>
</div>
<!-- Gantt Style Loading Bar -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<div class="h-3 w-12 shimmer opacity-20"></div>
<div class="h-3 w-8 shimmer opacity-20"></div>
</div>
<div class="h-2 w-full bg-secondary-container">
<div class="h-full w-2/3 bg-primary-container/40 animate-pulse"></div>
</div>
</div>
<div class="pt-4 flex gap-2">
<div class="h-8 w-20 shimmer opacity-20"></div>
<div class="h-8 w-20 shimmer opacity-20"></div>
</div>
</div>
</div>
</section>
<!-- Big Visual Empty State Texture -->
<div class="w-full h-64 bg-surface-container-lowest flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 opacity-10" data-alt="geometric grid of small amber dots over deep navy background mimicking technical blueprints" style="background-image: radial-gradient(#ffc174 1px, transparent 1px); background-size: 24px 24px;"></div>
<div class="relative z-10 text-center space-y-4">
<span class="material-symbols-outlined text-6xl text-surface-container-highest">construction</span>
<p class="font-headline font-bold text-2xl tracking-tight text-surface-container-highest uppercase">Dashboard Initializing</p>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 pb-safe bg-[#131b2e] rounded-none border-t border-[#2d3449]">
<!-- Active Item: Schedule -->
<a class="flex flex-col items-center justify-center bg-amber-500 text-black px-4 py-1 rounded-sm immediate-state-change" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_today</span>
<span class="font-manrope text-[10px] font-bold uppercase tracking-widest mt-1">Schedule</span>
</a>

</a>
